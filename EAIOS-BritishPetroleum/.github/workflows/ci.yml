# ─────────────────────────────────────────────────────────────────────────────
# EAIOS-BP — Continuous Integration
#
# Runs on every push and PR to main.
# Vercel and Render auto-deploy from GitHub after this passes.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: type-check + lint + build ─────────────────────────────────────
  frontend:
    name: Frontend (React/TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint -- --max-warnings 0
        continue-on-error: true   # warnings don't block — remove once lint is clean

      - name: Build
        run: CI=false npm run build
        env:
          REACT_APP_API_URL: https://eaios-bp-api.onrender.com

  # ── Backend: install + syntax check + import check ──────────────────────────
  backend:
    name: Backend (FastAPI/Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff --quiet
          ruff check src/ --select E,F,W --ignore E501
        continue-on-error: true   # warnings don't block — remove once lint is clean

      - name: Syntax check
        run: python -m py_compile src/main.py src/config.py

  # ── Refiner AI Backend: same checks ─────────────────────────────────────────
  refiner-ai-backend:
    name: Refiner AI Backend (FastAPI/Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "05-manufacturing-plant-operations/applications/Refiner AI/backend"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: "05-manufacturing-plant-operations/applications/Refiner AI/backend/requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile src/main.py src/config.py
