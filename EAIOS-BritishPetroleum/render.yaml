# ─────────────────────────────────────────────────────────────────────────────
# Render Blueprint — EAIOS-BritishPetroleum
# https://render.com/docs/blueprint-spec
#
# How to use:
#   1. Push this file to your GitHub repo (already done)
#   2. Go to render.com → New → Blueprint
#   3. Connect your GitHub repo — Render reads this file automatically
#   4. Set the 4 "sync: false" env vars in the Render dashboard:
#        DATABASE_URL  → from Supabase dashboard
#        REDIS_URL     → from Upstash dashboard (rediss://... URL)
#        FRONTEND_URL  → your Vercel URL (e.g. https://eaios-bp.vercel.app)
#      SECRET_KEY is auto-generated by Render.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Main EAIOS-BP FastAPI Backend ──────────────────────────────────────────
  - type: web
    name: eaios-bp-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false          # Set in Render dashboard — Supabase connection string
      - key: REDIS_URL
        sync: false          # Set in Render dashboard — Upstash rediss:// URL
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false          # Set after Vercel deploy — e.g. https://eaios-bp.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── Refiner AI FastAPI Backend ─────────────────────────────────────────────
  - type: web
    name: refiner-ai-api
    runtime: python
    region: oregon
    plan: free
    rootDir: 05-manufacturing-plant-operations/applications/Refiner AI/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false          # Same Supabase DB — different schema prefix
      - key: REDIS_URL
        sync: false          # Same Upstash Redis instance
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false          # Vercel URL for CORS
      - key: PYTHON_VERSION
        value: 3.11.0
