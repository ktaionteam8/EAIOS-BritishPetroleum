# ─────────────────────────────────────────────────────────────────────────────
# Render Blueprint — EAIOS-BritishPetroleum
# https://render.com/docs/blueprint-spec
#
# Primary Hosting Strategy:
#   Frontend  → Vercel       (https://eaios-bp.vercel.app)
#   Backend   → Render       (https://eaios-bp-api.onrender.com)
#   Database  → Supabase     (PostgreSQL — no local DB required)
#   Cache     → Upstash      (Redis — serverless, TLS)
#
# How to deploy:
#   1. Push this file to your GitHub repo
#   2. Go to render.com → New → Blueprint
#   3. Connect your GitHub repo — Render reads this file automatically
#   4. Set the "sync: false" env vars in the Render dashboard:
#        DATABASE_URL     → Supabase connection string (Settings → Database)
#        REDIS_URL        → Upstash rediss:// URL (TLS required)
#        FRONTEND_URL     → your Vercel URL (e.g. https://eaios-bp.vercel.app)
#        ANTHROPIC_API_KEY → from console.anthropic.com/api-keys
#      SECRET_KEY is auto-generated by Render — no action needed.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Main EAIOS-BP FastAPI Backend ──────────────────────────────────────────
  - type: web
    name: eaios-bp-api
    runtime: python
    region: oregon
    plan: free
    rootDir: EAIOS-BritishPetroleum/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false          # Supabase: postgresql+asyncpg://postgres.[password]@db.[ref].supabase.co:5432/postgres
      - key: REDIS_URL
        sync: false          # Upstash: rediss://default:[password]@[host]:6380
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false          # Vercel URL — also sets CORS (e.g. https://eaios-bp.vercel.app)
      - key: ANTHROPIC_API_KEY
        sync: false          # Required for /api/chat (RefinerAI Advisor)
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── Refiner AI FastAPI Backend ─────────────────────────────────────────────
  - type: web
    name: refiner-ai-api
    runtime: python
    region: oregon
    plan: free
    rootDir: EAIOS-BritishPetroleum/05-manufacturing-plant-operations/applications/Refiner AI/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false          # Same Supabase DB
      - key: REDIS_URL
        sync: false          # Same Upstash Redis instance
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false          # Vercel URL for CORS
      - key: ANTHROPIC_API_KEY
        sync: false          # Required for AI features
      - key: PYTHON_VERSION
        value: 3.11.0
