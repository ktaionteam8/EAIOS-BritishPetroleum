version: 1
disable_existing_loggers: false
formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.FileHandler
    formatter: standard
    filename: logs/shadow-it-rationalization.log
loggers:
  src:
    level: INFO
    handlers: [console, file]
root:
  level: WARNING
  handlers: [console]
